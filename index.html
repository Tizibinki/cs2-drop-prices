<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CS2 Drop Prices</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="layout">
    <div id="nav"></div>
    <div id="main">
      <h1>Check the Profits from your weekly Drops!</h1>
      <p>This tool dynamically loads the current Steam prices for weekly Drops using the Cloudflare Worker API.</p>
    </div>
  </div>

  <script>
    const shortWear = ["(FN)", "(MW)", "(FT)", "(WW)", "(BS)"];
    const wearMap = {
      "(FN)": "Factory New",
      "(MW)": "Minimal Wear",
      "(FT)": "Field-Tested",
      "(WW)": "Well-Worn",
      "(BS)": "Battle-Scarred"
    };

    async function loadsite() {
      try {
        // Fetch skins + prices from your Worker
        const res = await fetch("https://collections.tizibinki.workers.dev/api/skins");
        const items = await res.json();

        const main = document.getElementById("main");
        const nav = document.getElementById("nav");

        items.forEach(skin => {
          const weapon = skin.collection;
          const weaponId = `weapon-${weapon.replace(/\s+/g, "-").toLowerCase()}`;

          // Create collection header
          let itempart = document.getElementById(weaponId);
          if (!itempart) {
            itempart = document.createElement("div");
            const itemhead = document.createElement("h1");
            itemhead.id = weaponId;
            itemhead.textContent = weapon;
            itempart.appendChild(itemhead);
            main.appendChild(itempart);

            // Navigation
            const navitemhead = document.createElement("div");
            navitemhead.className = "navitemmain";

            const dropdwn = document.createElement("div");
            dropdwn.className = "dropdwn";

            const arrow = document.createElement("span");
            arrow.className = "arrow";
            arrow.textContent = ">";

            const mainlink = document.createElement("span");
            mainlink.textContent = weapon;
            mainlink.className = "mainlink";
            mainlink.style.cursor = "pointer";
            mainlink.addEventListener("click", () => {
              document.getElementById(weaponId).scrollIntoView({ behavior: "smooth", block: "start" });
            });

            dropdwn.appendChild(arrow);
            dropdwn.appendChild(mainlink);

            const navitemsub = document.createElement("div");
            navitemsub.className = "skinlist";

            navitemhead.appendChild(dropdwn);
            navitemhead.appendChild(navitemsub);
            nav.appendChild(navitemhead);
          }

          // Table for skin
          const table = document.createElement("table");
          const thead = document.createElement("thead");
          const headRow = document.createElement("tr");
          ["Skin", "Market Volume", "Median Price", "Lowest Price", "Market Link"].forEach(text => {
            const th = document.createElement("th");
            th.textContent = text;
            headRow.appendChild(th);
          });
          thead.appendChild(headRow);
          table.appendChild(thead);

          const tbody = document.createElement("tbody");
          const wears = Object.keys(skin.prices).length ? Object.keys(skin.prices) : [""];

          wears.forEach(wear => {
            const tr = document.createElement("tr");

            const tdName = document.createElement("td");
            tdName.textContent = wear ? `${skin.name} (${wear})` : skin.name;

            const tdVolume = document.createElement("td");
            tdVolume.textContent = "N/A";

            const tdMedian = document.createElement("td");
            tdMedian.textContent = skin.prices[wear] || "N/A";

            const tdLowest = document.createElement("td");
            tdLowest.textContent = "N/A";

            const tdLink = document.createElement("td");
            tdLink.textContent = "Visit Market";
            tdLink.classList.add("button");
            const fullName = wear ? `${skin.name} (${wear})` : skin.name;
            tdLink.dataset.url = `https://steamcommunity.com/market/listings/730/${encodeURIComponent(fullName)}`;

            [tdName, tdVolume, tdMedian, tdLowest, tdLink].forEach(td => tr.appendChild(td));
            tbody.appendChild(tr);
          });

          table.appendChild(tbody);
          itempart.appendChild(table);
        });
      } catch (err) {
        console.error("Error fetching skins from Worker:", err);
        document.getElementById("main").textContent = "Failed to load skin data.";
      }
    }

    document.addEventListener("click", e => {
      const cell = e.target.closest("td[data-url]");
      if (cell) window.open(cell.dataset.url, "_blank");
    });

    loadsite();
  </script>
</body>
</html>
